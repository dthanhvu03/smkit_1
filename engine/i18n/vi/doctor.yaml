# Doctor/build diagnostic message catalog (Vietnamese — the kit's original default).
# Keyed by stable CODE. Wording here is transcribed VERBATIM from the code that shipped
# before this catalog existed, so the default (no project.language: en) behavior is
# byte-for-byte unchanged.

# --- kitgen.mjs: Node / Config / Paths / Hooks -----------------------------
NODE_TOO_OLD: "node v{version} < 18 -> nâng cấp Node lên >= 18"
NODE_OK: "node v{version} (>= 18)"
CONFIG_FILE_MISSING: "thiếu kit.config.yaml -> chạy: npm run init"
CONFIG_PARSE_ERROR: "kit.config.yaml không parse được ({message}) -> {hint}"
CONFIG_VALID: "kit.config.yaml hợp lệ"
PATHS_MISSING_DIR: "thiếu thư mục {dir}/"
HOOKS_MISSING_FILE: "thiếu .kit/hooks/{file}"
HOOKS_YAML_DRIFT: "hook yaml lệch nguồn -> chạy: cp tools/kitgen/yaml.mjs .kit/hooks/yaml.mjs"
HOOKS_SETTINGS_HOOK_MISSING: "settings tham chiếu hook không tồn tại: {file}"

# --- kitgen.mjs: Generated output (drift) ----------------------------------
GENERATED_OUTPUT_BUILD_FAILED: "không dựng được output để so drift ({message})"
GENERATED_OUTPUT_DRIFT: "{outDir}/ lệch nguồn ({count} file) -> chạy: npm run build"
GENERATED_OUTPUT_MATCH: "{count} file khớp ({outDir}/)"
MISSING_OWNED: "MISSING_OWNED: {outDir}/{rel}"
MODIFIED_OWNED: "MODIFIED_OWNED: {outDir}/{rel}"
STALE_OWNED: "STALE_OWNED: {outDir}/{rel} -> chạy build để dọn"
UNEXPECTED_UNOWNED: "UNEXPECTED_UNOWNED: {outDir}/{rel} (không do kit sinh; được giữ lại)"

