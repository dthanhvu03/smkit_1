RULES_ENFORCE_MISSING_LABEL: "rule \"{id}\" thiếu nhãn enforce"
RULES_ENFORCE_GENERATOR_MISSING: "rule \"{id}\" enforce=generator nhưng thiếu tools/kitgen/kitgen.mjs"
RULES_ENFORCE_GATE_NO_SKILL: "rule \"{id}\" enforce=gate nhưng không skill nào có mục output format"
RULES_ENFORCE_HOOK_UNMAPPED: "rule \"{id}\" enforce=hook nhưng chưa có mapping hook (bổ sung HOOK_MAP)"
