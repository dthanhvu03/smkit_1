RULES_ENFORCE_OK: "{count} rule enforce hợp lệ"

# --- kitgen.mjs: Skills P0 legacy doctor checks ----------------------------
SKILLS_P0_MISSING: "thiếu skill {id}"
SKILLS_P0_DESCRIPTION_MISSING: "skill {id} thiếu description"
SKILLS_P0_OUTPUT_SECTION_MISSING: "skill {id} thiếu mục output format"
SKILLS_P0_OK: "code-review, refactor, test-design"

# --- kitgen.mjs: Roles legacy doctor checks ---------------------------------
ROLES_MODEL_MISSING: "role \"{name}\" thiếu model"
ROLES_TOOLS_MISSING: "role \"{name}\" thiếu tools"
ROLES_OK: "{count} role có description trigger + model + tools"

# --- validate.mjs: config-level checks --------------------------------------
CONFIG_VERSION_MISSING: "thiếu 'version'"
CONFIG_PROJECT_NAME_MISSING: "thiếu 'project.name'"
CONFIG_MODE_INVALID: "mode \"{mode}\" không hợp lệ -> dùng: {modes}"
CONFIG_PROFILE_NOT_FOUND: "stack.profile \"{profile}\" không tồn tại -> xem profiles/"
CONFIG_AGENTS_EMPTY: "'agents' rỗng -> khai báo ít nhất một target"
CONFIG_AGENT_UNKNOWN: "agent target lạ \"{agent}\" -> dùng: {known}"
