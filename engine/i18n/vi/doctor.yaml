ROLE_SCHEMA_VERSION_INVALID: "{tag}: schemaVersion \"{value}\" không hợp lệ -> phải là số nguyên dương"
ROLE_SCHEMA_VERSION_UNKNOWN: "{tag}: schemaVersion {value} chưa được kit hỗ trợ (hỗ trợ: {supported}) -> kiểm tra tương thích trước khi dùng"
ROLE_PERMISSION_CONTRADICTION: "{tag}: tool \"{tool}\" vừa allowTools vừa denyTools -> mâu thuẫn"
ROLE_PERMISSION_MODE_INVALID: "{tag}: permissions.mode \"{mode}\" không hợp lệ -> dùng {modes}"
ROLE_ISOLATION_INVALID: "{tag}: runtime.isolation \"{mode}\" không hợp lệ -> dùng {modes}"
ROLE_EFFORT_INVALID: "{tag}: runtime.effort \"{effort}\" không hợp lệ -> dùng {levels}"
ROLE_MEMORY_SCOPE_INVALID: "{tag}: memory.scope \"{scope}\" không hợp lệ -> dùng {scopes}"
ROLE_MAX_TURNS_INVALID: "{tag}: runtime.maxTurns phải là số nguyên dương"
ROLE_SKILL_PRELOAD_BROKEN_REFERENCE: "{tag}: preload skill \"{sid}\" không tồn tại"
ROLE_SKILL_PRELOAD_MANUAL_ONLY_CONFLICT: "{tag}: skill \"{sid}\" có disable-model-invocation (manual-only) -> không thể preload (Claude sẽ bỏ qua và chỉ ghi log debug)"
ROLE_DESCRIPTION_MISSING: "{tag}: thiếu description"
ROLE_DESCRIPTION_TRIGGER_WEAK: "{tag}: description không có cue rõ ràng cho việc delegate (vd \"use when\", \"invoke for\", \"dùng khi\") -> agent khó tự chọn role (heuristic, có thể false positive)"
ROLE_OUTPUT_SECTION_MISSING: "{tag}: body thiếu mục output bắt buộc \"{section}\""

# --- emitter.mjs: rule governance ----------------------------------------------
RULE_ID_MISSING: "rule thiếu id (title=\"{title}\")"
RULE_ID_CONFLICT: "rule id \"{id}\" trùng lặp giữa engine/profile -> đổi tên id (hoặc thêm 'override: true' nếu profile cố ý ghi đè)"
RULE_ACTIVATION_MODE_INVALID: "rule \"{id}\": activation.mode \"{mode}\" không hợp lệ -> dùng {modes}"
RULE_ENFORCEMENT_TYPE_INVALID: "rule \"{id}\": enforcement.type \"{type}\" không hợp lệ -> dùng {types}"
RULE_HOOK_UNMAPPED: "rule \"{id}\": enforcement.type=hook nhưng chưa có mapping trong RULE_HOOK_MAP"
