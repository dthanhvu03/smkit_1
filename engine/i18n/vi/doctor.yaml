# --- emitter.mjs: invariants -------------------------------------------------
INVARIANT_ENFORCEMENT_INVALID: "invariant \"{id}\": enforcement \"{enforcement}\" invalid -> use {allowed}"
INVARIANT_ID_CONFLICT: "invariant id conflict: \"{id}\" ({prevLayer} vs {layer}) -> set 'override: true' on the project invariant to replace, or rename its id"

# --- emitter.mjs: skill governance -------------------------------------------
SKILL_SCHEMA_VERSION_INVALID: "{tag}: schemaVersion \"{value}\" không hợp lệ -> phải là số nguyên dương"
SKILL_SCHEMA_VERSION_UNKNOWN: "{tag}: schemaVersion {value} chưa được kit hỗ trợ (hỗ trợ: {supported}) -> kiểm tra tương thích trước khi dùng"
SKILL_NAME_FORMAT_INVALID: "{tag}: directory name không hợp lệ theo Agent Skills spec (chỉ a-z0-9-, không bắt đầu/kết thúc bằng '-', không '--', tối đa 64 ký tự)"
SKILL_DESCRIPTION_MISSING: "{tag}: thiếu description (bắt buộc theo Agent Skills spec)"
SKILL_DESCRIPTION_TOO_LONG: "{tag}: description dài {length} ký tự (>{limit}, giới hạn Agent Skills spec) -> rút gọn, đưa chi tiết vào references/"
SKILL_DESCRIPTION_LISTING_TOO_LONG: "{tag}: description+when_to_use dài {length} ký tự (>{limit}, giới hạn hiển thị của Claude) -> sẽ bị cắt bớt trong skill listing"
SKILL_DESCRIPTION_TRIGGER_WEAK: "{tag}: description/when_to_use không có cue kích hoạt rõ ràng (vd \"use when\", \"invoke\", \"dùng khi\") -> agent có thể khó chọn đúng skill (heuristic, có thể false positive)"
SKILL_TRUST_TIER_INVALID: "{tag}: trustTier \"{tier}\" không hợp lệ -> dùng {tiers}"
SKILL_TRUST_TIER_AUTO_INVOKE: "{tag}: trustTier {tier} phải manual-only -> đặt invocation.implicit: false trong skill.kit.yaml"
SKILL_TRUST_TIER_MISSING_HASH: "{tag}: trustTier {tier} thiếu provenance.contentHash -> pin nội dung bằng hash trước khi dùng"
SKILL_HASH_FORMAT_INVALID: "{tag}: provenance.contentHash \"{hashField}\" sai định dạng -> dùng \"sha256:<hex>\" hoặc \"sha512:<hex>\""
SKILL_HASH_ALGO_LENGTH_MISMATCH: "{tag}: contentHash có {hexLen} hex char, không khớp độ dài chuẩn của {algo} ({expectedLen})"
SKILL_HASH_MISMATCH: "{tag}: contentHash không khớp nội dung thực tế (declared={declared}… actual={actual}…) -> nội dung đã đổi kể từ khi pin, cập nhật hash sau khi review lại"
SKILL_PERMISSION_CONTRADICTION: "{tag}: tool \"{tool}\" vừa deniedTools vừa preApprovedTools -> mâu thuẫn"
SKILL_PERMISSION_UNREQUESTED: "{tag}: preApprovedTools \"{tool}\" không nằm trong requestedTools -> khai báo requestedTools trước"

