# Doctor/build diagnostic message catalog (English). Keyed by stable CODE — the SAME
# code kitgen.mjs/validate.mjs/emitter.mjs already tag messages with. Selected by
# project.language (default "vi" when a project doesn't set language: en, matching
# the kit's original default audience). Placeholders use {name} substitution.

# --- kitgen.mjs: Node / Config / Paths / Hooks -----------------------------
NODE_TOO_OLD: "node v{version} < 18 -> upgrade Node to >= 18"
NODE_OK: "node v{version} (>= 18)"
CONFIG_FILE_MISSING: "missing kit.config.yaml -> run: npm run init"
CONFIG_PARSE_ERROR: "kit.config.yaml could not be parsed ({message}) -> {hint}"
CONFIG_VALID: "kit.config.yaml is valid"
PATHS_MISSING_DIR: "missing directory {dir}/"
HOOKS_MISSING_FILE: "missing .kit/hooks/{file}"
HOOKS_YAML_DRIFT: "hook yaml.mjs is out of sync -> run: cp tools/kitgen/yaml.mjs .kit/hooks/yaml.mjs"
HOOKS_SETTINGS_HOOK_MISSING: "settings.json references a hook that does not exist: {file}"

# --- kitgen.mjs: Generated output (drift) ----------------------------------
GENERATED_OUTPUT_BUILD_FAILED: "could not build output to compare drift ({message})"
GENERATED_OUTPUT_DRIFT: "{outDir}/ is out of sync ({count} file(s)) -> run: npm run build"
GENERATED_OUTPUT_MATCH: "{count} file(s) match ({outDir}/)"
MISSING_OWNED: "MISSING_OWNED: {outDir}/{rel}"
MODIFIED_OWNED: "MODIFIED_OWNED: {outDir}/{rel}"
STALE_OWNED: "STALE_OWNED: {outDir}/{rel} -> run build to clean it up"
UNEXPECTED_UNOWNED: "UNEXPECTED_UNOWNED: {outDir}/{rel} (not generated by the kit; left in place)"

# --- kitgen.mjs: Rules (enforce) legacy doctor checks ----------------------
RULES_ENFORCE_MISSING_LABEL: "rule \"{id}\" is missing an enforce label"
RULES_ENFORCE_GENERATOR_MISSING: "rule \"{id}\" declares enforce=generator but tools/kitgen/kitgen.mjs is missing"
RULES_ENFORCE_GATE_NO_SKILL: "rule \"{id}\" declares enforce=gate but no skill has an output-format section"
RULES_ENFORCE_HOOK_UNMAPPED: "rule \"{id}\" declares enforce=hook but has no mapping yet (add it to HOOK_MAP)"
RULES_ENFORCE_HOOK_MISSING_FILE: "rule \"{id}\" declares enforce=hook but .kit/hooks/{hookFile} is missing"
RULES_ENFORCE_TOKEN_UNRECOGNIZED: "rule \"{id}\" declares enforce=\"{tok}\" (not recognized)"
RULES_ENFORCE_OK: "{count} rule(s) have a valid enforce label"

# --- kitgen.mjs: Skills P0 legacy doctor checks ----------------------------
SKILLS_P0_MISSING: "missing required skill {id}"
SKILLS_P0_DESCRIPTION_MISSING: "skill {id} is missing a description"
SKILLS_P0_OUTPUT_SECTION_MISSING: "skill {id} is missing an output-format section"
SKILLS_P0_OK: "code-review, refactor, test-design"

# --- kitgen.mjs: Roles legacy doctor checks ---------------------------------
ROLES_MODEL_MISSING: "role \"{name}\" is missing model"
ROLES_TOOLS_MISSING: "role \"{name}\" is missing tools"
ROLES_OK: "{count} role(s) have a delegation-trigger description + model + tools"

# --- validate.mjs: config-level checks --------------------------------------
CONFIG_VERSION_MISSING: "missing 'version'"
CONFIG_PROJECT_NAME_MISSING: "missing 'project.name'"
CONFIG_MODE_INVALID: "mode \"{mode}\" is invalid -> use: {modes}"
CONFIG_PROFILE_NOT_FOUND: "stack.profile \"{profile}\" does not exist -> see profiles/"
CONFIG_AGENTS_EMPTY: "'agents' is empty -> declare at least one target"
CONFIG_AGENT_UNKNOWN: "unknown agent target \"{agent}\" -> use: {known}"
CONFIG_OUTDIR_NOT_STRING: "'outDir' is not a string -> defaulting to 'dist'"
CONFIG_OUTDIR_OUTSIDE_PROJECT: "outDir \"{outDir}\" is outside the project ({abs}) -> choose a directory inside the project"

# --- emitter.mjs: invariants -------------------------------------------------
INVARIANT_ENFORCEMENT_INVALID: "invariant \"{id}\": enforcement \"{enforcement}\" invalid -> use {allowed}"
INVARIANT_ID_CONFLICT: "invariant id conflict: \"{id}\" ({prevLayer} vs {layer}) -> set 'override: true' on the project invariant to replace it, or rename its id"

# --- emitter.mjs: skill governance -------------------------------------------
SKILL_SCHEMA_VERSION_INVALID: "{tag}: schemaVersion \"{value}\" invalid -> must be a positive integer"
SKILL_SCHEMA_VERSION_UNKNOWN: "{tag}: schemaVersion {value} not yet supported by the kit (supported: {supported}) -> check compatibility before use"
SKILL_NAME_FORMAT_INVALID: "{tag}: directory name invalid per the Agent Skills spec (only a-z0-9-, no leading/trailing '-', no '--', max 64 chars)"
SKILL_DESCRIPTION_MISSING: "{tag}: missing description (required by the Agent Skills spec)"
SKILL_DESCRIPTION_TOO_LONG: "{tag}: description is {length} chars (>{limit}, the Agent Skills spec limit) -> shorten it, move detail into references/"
SKILL_DESCRIPTION_LISTING_TOO_LONG: "{tag}: description+when_to_use is {length} chars (>{limit}, Claude's listing display limit) -> it will be truncated in the skill listing"
SKILL_DESCRIPTION_TRIGGER_WEAK: "{tag}: description/when_to_use has no clear trigger cue (e.g. \"use when\", \"invoke\", \"dùng khi\") -> the agent may have trouble picking the right skill (heuristic, may be a false positive)"
SKILL_QUALITY_INCOMPLETE: "{tag}: body reads thin for a senior skill — no clear {missing} (heuristic quality-bar check, may be a false positive)"
SKILL_TRUST_TIER_INVALID: "{tag}: trustTier \"{tier}\" is invalid -> use {tiers}"
SKILL_TRUST_TIER_AUTO_INVOKE: "{tag}: trustTier {tier} must be manual-only -> set invocation.implicit: false in skill.kit.yaml"
SKILL_TRUST_TIER_MISSING_HASH: "{tag}: trustTier {tier} is missing provenance.contentHash -> pin the content with a hash before use"
SKILL_HASH_FORMAT_INVALID: "{tag}: provenance.contentHash \"{hashField}\" has the wrong format -> use \"sha256:<hex>\" or \"sha512:<hex>\""
SKILL_HASH_ALGO_LENGTH_MISMATCH: "{tag}: contentHash has {hexLen} hex chars, which does not match {algo}'s standard length ({expectedLen})"
SKILL_HASH_MISMATCH: "{tag}: contentHash does not match the actual content (declared={declared}… actual={actual}…) -> the content changed since it was pinned; update the hash after reviewing it"
SKILL_PERMISSION_CONTRADICTION: "{tag}: tool \"{tool}\" is in BOTH deniedTools and preApprovedTools -> contradiction"
SKILL_PERMISSION_UNREQUESTED: "{tag}: preApprovedTools \"{tool}\" is not in requestedTools -> declare requestedTools first"

# --- emitter.mjs: role governance ---------------------------------------------
ROLE_SCHEMA_VERSION_INVALID: "{tag}: schemaVersion \"{value}\" invalid -> must be a positive integer"
ROLE_SCHEMA_VERSION_UNKNOWN: "{tag}: schemaVersion {value} not yet supported by the kit (supported: {supported}) -> check compatibility before use"
ROLE_PERMISSION_CONTRADICTION: "{tag}: tool \"{tool}\" is in BOTH allowTools and denyTools -> contradiction"
ROLE_PERMISSION_MODE_INVALID: "{tag}: permissions.mode \"{mode}\" is invalid -> use {modes}"
ROLE_ISOLATION_INVALID: "{tag}: runtime.isolation \"{mode}\" is invalid -> use {modes}"
ROLE_EFFORT_INVALID: "{tag}: runtime.effort \"{effort}\" is invalid -> use {levels}"
ROLE_MEMORY_SCOPE_INVALID: "{tag}: memory.scope \"{scope}\" is invalid -> use {scopes}"
ROLE_MAX_TURNS_INVALID: "{tag}: runtime.maxTurns must be a positive integer"
ROLE_SKILL_PRELOAD_BROKEN_REFERENCE: "{tag}: preload skill \"{sid}\" does not exist"
ROLE_SKILL_PRELOAD_MANUAL_ONLY_CONFLICT: "{tag}: skill \"{sid}\" has disable-model-invocation (manual-only) -> it cannot be preloaded (Claude would skip it and only log a debug warning)"
ROLE_DESCRIPTION_MISSING: "{tag}: missing description"
ROLE_DESCRIPTION_TRIGGER_WEAK: "{tag}: description has no clear delegation cue (e.g. \"use when\", \"invoke for\", \"dùng khi\") -> the agent may have trouble self-selecting this role (heuristic, may be a false positive)"
ROLE_SENIORITY_INCOMPLETE: "{tag}: body reads thin for a senior role — no clear {missing} (heuristic hiring-bar check, may be a false positive)"
ROLE_OUTPUT_SECTION_MISSING: "{tag}: body is missing the required output section \"{section}\""

# --- emitter.mjs: rule governance ----------------------------------------------
RULE_ID_MISSING: "rule is missing an id (title=\"{title}\")"
RULE_ID_CONFLICT: "rule id \"{id}\" is duplicated across engine/profile -> rename it (or add 'override: true' if the profile means to replace it)"
RULE_ACTIVATION_MODE_INVALID: "rule \"{id}\": activation.mode \"{mode}\" is invalid -> use {modes}"
RULE_ENFORCEMENT_TYPE_INVALID: "rule \"{id}\": enforcement.type \"{type}\" is invalid -> use {types}"
RULE_HOOK_UNMAPPED: "rule \"{id}\": enforcement.type=hook but it has no mapping in RULE_HOOK_MAP yet"
RULE_HOOK_MISSING: "rule \"{id}\": enforcement.type=hook but .kit/hooks/{hookFile} is missing"
RULE_STATIC_CHECK_NO_BACKING: "rule \"{id}\": enforcement.type=static-check but no skill has an output-format section"

# --- skill schema / migration / capability warnings (collectBuildWarnings) --
SKILL_NAME_MISMATCH: "name \"{name}\" != directory \"{dir}\"; using the directory name"
SKILL_PATHS_TRIVIAL_DROPPED: "\"paths\" matches everything (no real gate); dropped as a no-op from the portable SKILL.md"
SKILL_PATHS_MIGRATED_VENDOR_OVERLAY: "\"paths\" is not an Agent Skills field; migrated to the Claude-only activation overlay (skill.kit.yaml activation.claude.paths)"
SKILL_METADATA_NOT_STRING: "metadata must be string→string; the complex value was ignored"
SKILL_RELATED_FIELDS_NONSTANDARD: "related_roles/related_rules are non-standard and are dropped from SKILL.md"
SKILL_SUPPORTING_FILE_ESCAPES_ROOT: "\"{name}\" resolves outside the skill's own folder (real path: {real}) and is excluded"
SKILL_INVOCATION_CONTROL_UNSUPPORTED_TARGET: "target \"{agent}\" has not confirmed support for blocking auto-invoke (invocationControl={support}) — skill \"{id}\" may still auto-activate despite being declared manual-only"
SKILL_PATH_GATE_UNSUPPORTED_TARGET: "path-gated activation for skill \"{id}\" is a Claude vendor extension — target \"{agent}\" has no confirmed equivalent, the skill will always activate by description"
SKILL_NAME_MISMATCH_REMEDIATION: "set SKILL.md name to the folder name"
SKILL_PATHS_TRIVIAL_DROPPED_REMEDIATION: "omit paths entirely if no activation gating is intended"
SKILL_PATHS_MIGRATED_VENDOR_OVERLAY_REMEDIATION: "declare it as activation.claude.paths in skill.kit.yaml going forward"
SKILL_METADATA_NOT_STRING_REMEDIATION: "move it to skill.kit.yaml"
SKILL_RELATED_FIELDS_NONSTANDARD_REMEDIATION: "declare them in skill.kit.yaml"
SKILL_SUPPORTING_FILE_ESCAPES_ROOT_REMEDIATION: "keep scripts/references/assets self-contained inside the skill folder; do not symlink outside it"
SKILL_INVOCATION_CONTROL_UNSUPPORTED_TARGET_REMEDIATION: "verify \"{agent}\"'s capability, or do not emit this skill for that target"
SKILL_PATH_GATE_UNSUPPORTED_TARGET_REMEDIATION: "consider adding an equivalent path-scoped Rule for target \"{agent}\""
